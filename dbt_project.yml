name: 'acmemart_dbt'
version: '1.0.0'
config-version: 2

profile: 'acmemart_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ---------------------------------------------------------------
# List every seed filename here (without .csv extension).
# When you add a new store CSV to the seeds/ folder, add its
# name to this list and run `dbt seed` then `dbt run`.
# ---------------------------------------------------------------
vars:
  seed_files:
    - "store_S002"

models:
  acmemart_dbt:
    staging:
      +materialized: view
      +schema: staging
    gold:
      +materialized: table
      +schema: gold
    aggregates:
      +materialized: table
      +schema: aggregates

seeds:
  acmemart_dbt:
    +schema: bronze
    +quote_columns: false