version: 2

models:

  - name: agg_sales_by_store
    description: >
      Monthly sales performance aggregated per store.
      One row per store_id + year + month combination.
      Used for store comparison, regional performance, and trend reporting.
    columns:
      - name: store_id
        description: "Store identifier."
        tests:
          - not_null
      - name: transaction_year
        description: "Year of the aggregation bucket."
        tests:
          - not_null
      - name: transaction_month
        description: "Month number of the aggregation bucket."
        tests:
          - not_null
      - name: total_transactions
        description: "Count of distinct transactions for this store and month."
        tests:
          - not_null
      - name: total_units_sold
        description: "Sum of quantity for this store and month."
        tests:
          - not_null
      - name: total_revenue
        description: "Sum of total_amount for this store and month."
        tests:
          - not_null
      - name: avg_order_value
        description: "Average transaction value for this store and month."
      - name: unique_customers
        description: "Count of distinct customers who shopped at this store this month."
      - name: unique_products_sold
        description: "Count of distinct products sold at this store this month."
      - name: cash_transactions
        description: "Count of transactions paid with cash."
      - name: card_transactions
        description: "Count of transactions paid by card."
      - name: transfer_transactions
        description: "Count of transactions paid by transfer."
      - name: peak_hour
        description: "Most frequently occurring transaction hour for this store and month."

  - name: agg_sales_by_product
    description: >
      Monthly sales aggregated per product and category.
      One row per product_id + year + month combination.
      Used for product performance, category mix, and pricing analysis.
    columns:
      - name: product_id
        description: "Product identifier."
        tests:
          - not_null
      - name: product_name
        description: "Product display name."
        tests:
          - not_null
      - name: category
        description: "Product category."
        tests:
          - not_null
      - name: transaction_year
        description: "Year of the aggregation bucket."
        tests:
          - not_null
      - name: transaction_month
        description: "Month of the aggregation bucket."
        tests:
          - not_null
      - name: total_transactions
        description: "Count of distinct transactions involving this product this month."
        tests:
          - not_null
      - name: total_units_sold
        description: "Total quantity of this product sold this month."
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue generated by this product this month."
        tests:
          - not_null
      - name: avg_unit_price
        description: "Average unit price at which this product sold this month."
      - name: avg_transaction_value
        description: "Average value per transaction involving this product."
      - name: stores_selling
        description: "Count of distinct stores that sold this product this month."
      - name: unique_buyers
        description: "Count of distinct customers who purchased this product this month."

  - name: agg_customer_summary
    description: >
      One row per customer combining lifetime behavioural metrics from dim_customers
      with monthly purchase averages. Supports RFM segmentation, churn analysis,
      and customer lifetime value reporting.
    columns:
      - name: customer_id
        description: "Primary key — one row per customer."
        tests:
          - unique
          - not_null
      - name: first_purchase_date
        description: "Date of the customer's very first transaction."
      - name: last_purchase_date
        description: "Date of the customer's most recent transaction."
      - name: days_since_last_purchase
        description: "Recency metric — days elapsed since last purchase."
      - name: total_transactions
        description: "All-time count of transactions for this customer."
        tests:
          - not_null
      - name: lifetime_value
        description: "Total spend across the customer's full history."
        tests:
          - not_null
      - name: avg_order_value
        description: "Average transaction value across all orders."
      - name: stores_visited
        description: "Number of distinct stores this customer has visited."
      - name: unique_products_bought
        description: "Number of distinct products this customer has purchased."
      - name: preferred_payment_method
        description: "Most frequently used payment method."
      - name: recency_band
        description: "Active / At Risk / Lapsing / Churned."
        tests:
          - accepted_values:
              values: ['Active', 'At Risk', 'Lapsing', 'Churned']
      - name: frequency_band
        description: "High / Medium / Low transaction frequency."
        tests:
          - accepted_values:
              values: ['High', 'Medium', 'Low']
      - name: monetary_band
        description: "High Value / Mid Value / Low Value lifetime spend."
        tests:
          - accepted_values:
              values: ['High Value', 'Mid Value', 'Low Value']
      - name: avg_monthly_orders
        description: "Average number of orders placed per month."
      - name: avg_monthly_spend
        description: "Average spend per month across the customer's active months."
      - name: avg_stores_per_month
        description: "Average number of distinct stores visited per active month."
